<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>GGP ASTMA - De Puzzel</title>
    <style>
        :root { --police-blue: #1c2b4a; --police-gold: #f1c40f; --bg-gray: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-gray); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .instruction { background: var(--police-blue); color: white; padding: 20px; border-radius: 8px; max-width: 1100px; margin-bottom: 20px; }
        
        .container { 
            width: 100%; max-width: 1250px; 
            display: grid; grid-template-columns: 450px 1fr; /* Links de chaos, rechts de vakken */
            gap: 40px; align-items: start;
        }
        
        /* De Chaos-kolom */
        .source-container { background: #e2e8f0; padding: 20px; border-radius: 12px; min-height: 800px; }
        
        .draggable-item { 
            background: #fff; border: 2px solid #cbd5e1; padding: 15px; margin-bottom: 20px; 
            border-radius: 8px; font-size: 0.85rem; line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .locked { border-left: 8px solid #ef4444; }
        .unlocked { border-left: 8px solid #10b981; cursor: grab; background: #f0fdf4; transform: scale(1.02); }
        
        /* De ASTMA-vakken */
        .target-zones { display: flex; flex-direction: column; gap: 20px; }
        .drop-zone { 
            background: #fff; border: 3px dashed #cbd5e1; padding: 30px; border-radius: 12px; 
            min-height: 120px; position: relative; display: flex; align-items: center;
        }
        .drop-zone::before { 
            content: attr(data-label); position: absolute; top: -15px; left: 20px; 
            background: var(--police-blue); color: white; padding: 5px 15px; border-radius: 5px; font-weight: bold;
        }
        .correct-drop { border: 3px solid #10b981; background: #fff; }

        input { width: 90%; margin-top: 10px; padding: 8px; border: 1px solid #94a3b8; border-radius: 4px; }
    </style>
</head>
<body>

<div class="instruction">
    <strong>Instructie:</strong> De alinea's hieronder staan in de war. 
    <br>1. Verbeter de stijlfout in een blokje naar keuze om het te kunnen slepen.
    <br>2. Sleep het blokje naar het juiste vak (A, S, T, M of A) om het PV weer logisch op te bouwen.
</div>

<div class="container">
    <div class="source-container" id="source-list">
        <h2 style="margin-top:0; text-align:center; color:#475569;">Ongeordende Alinea's</h2>
    </div>

    <div class="target-zones">
        <div class="drop-zone" data-label="AANLEIDING (Wie/Wat/Waar/Wanneer)" data-type="A"></div>
        <div class="drop-zone" data-label="SITUATIE (Decor/OTT)" data-type="S"></div>
        <div class="drop-zone" data-label="TOEDRACHT (Handelingen/OVT)" data-type="T"></div>
        <div class="drop-zone" data-label="MAATREGELEN (Bevoegdheden/Recht)" data-type="M"></div>
        <div class="drop-zone" data-label="AFHANDELING (Slot/Ambtseed)" data-type="Af"></div>
    </div>
</div>

<script>
    const pvData = [
        { id: 1, type: "A", error: "telefoneren", text: "Op maandag 09 maart 2026 kregen wij, verbalisanten J. de VRIES en S. de JONG (aspiranten Drachten Centrum), van het OC de opdracht om naar de Sportlaan 7 te gaan. We moesten de melder op telefoneren over de situatie. We waren in uniform en reden in een herkenbaar voertuig." },
        { id: 2, type: "S", error: "witte", text: "De parkeervakken liggen aan de noordzijde van Sportlaan 7. Ter plaatse ligt witte sneeuw. Een zwarte VW Golf (AA-11-BB) staat geparkeerd. In de auto zit een man met een gezet postuur." },
        { id: 3, type: "T", error: "beseffen", text: "Ik zag op beelden dat J.J. STOUT geld aannam. Ik zag dat Stout zich niet leek te beseffen dat wij hem zagen toen hij een tas op de achterbank zette. Hij maakte een zenuwachtige indruk en trilde met zijn handen." },
        { id: 4, type: "M", error: "criminele", text: "Om 11:15 uur vorderde ik inzage in zijn ID. Vanwege zijn criminele misdaden uit het verleden en de tas met wit poeder, hebben we hem op grond van de Opiumwet aan zijn kleding onderzocht." },
        { id: 5, type: "Af", error: "eeuwig", text: "De verdachte is overgebracht naar bureau Drachten. De USB-stick is voor altijd en eeuwig veiliggesteld. Waarvan door ons op ambtseed is opgemaakt dit proces-verbaal." }
    ];

    const sourceList = document.getElementById('source-list');

    // De Sort-functie zorgt dat ze ELKE KEER in een andere chaos-volgorde staan
    pvData.sort(() => Math.random() - 0.5).forEach(item => {
        const div = document.createElement('div');
        div.className = 'draggable-item locked';
        div.id = `item-${item.id}`;
        div.innerHTML = `
            <div>${item.text}</div>
            <input type="text" placeholder="Type de stijlfout om te ontgrendelen..." oninput="check(this, '${item.error}', '${item.id}')">
        `;
        sourceList.appendChild(div);
    });

    window.check = (input, error, id) => {
        if (input.value.toLowerCase().trim() === error.toLowerCase()) {
            const el = document.getElementById(`item-${id}`);
            el.classList.replace('locked', 'unlocked');
            el.draggable = true;
            input.disabled = true;
            input.style.background = "#d1fae5";
            
            el.ondragstart = (e) => {
                e.dataTransfer.setData('id', id);
                e.dataTransfer.setData('type', pvData.find(x => x.id == id).type);
            };
        }
    };

    document.querySelectorAll('.drop-zone').forEach(zone => {
        zone.ondragover = (e) => e.preventDefault();
        zone.ondrop = (e) => {
            const id = e.dataTransfer.getData('id');
            const type = e.dataTransfer.getData('type');
            if (type === zone.dataset.type) {
                zone.appendChild(document.getElementById(`item-${id}`));
                zone.classList.add('correct-drop');
            } else {
                alert("Verkeerde categorie! Denk aan de GGP-structuur.");
            }
        };
    });
</script>
</body>
</html>
